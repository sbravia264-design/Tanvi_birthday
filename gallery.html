<!DOCTYPE html>
<html>
<head>
<title>Our Memories ❤️</title>
<style>
body{
margin:0;
background:#1e1e2f;
color:white;
text-align:center;
font-family:sans-serif;
}

h1{
padding-top:20px;
}

.slideshow{
width:280px;
height:280px;
margin:30px auto;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 20px pink;
}

.slideshow img{
width:100%;
height:100%;
object-fit:cover;
}

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:pink;
cursor:pointer;
}
</style>
</head>
<body>

<h1>Our Beautiful Moments 💖</h1>

<div class="slideshow">
<img id="slide" src="photo1.jpg">
</div>

<a href="surprise.html">
<button>Final Surprise 🎉</button>
</a>

<script>
let images=["photo1.jpg","photo2.jpg","photo3.jpg"];
let i=0;

setInterval(()=>{
i=(i+1)%images.length;
document.getElementById("slide").src=images[i];
},3000);
</script>

<audio id="bgmusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let music = document.getElementById("bgmusic");

// Check if music was already playing
if (sessionStorage.getItem("musicPlaying") === "true") {
    music.play();
}

// Play on first click
document.body.addEventListener("click", function () {
    music.play();
    sessionStorage.setItem("musicPlaying", "true");
});
</script>

<body>
</html>
